# --- Reproducibility ---
seed: 42

# --- Dataset ---
dataset:
  default: "fever"            # one of: fever, hotpotqa (overridable via CLI)
  fever_dev: "data/fever/dev.jsonl"
  fever_train: "data/fever/train.jsonl"
  hotpotqa_dev: "data/hotpotqa/dev.jsonl"

# --- Retrieval ---
retrieval:
  embedding_model: "IEITYuan/Yuan-embedding-2.0-en"
  k: 5                        # top-K passages returned to the LLM
  distractor_pool_size: 20    # random passages added to per-example retrieval pool

# --- Poisoning ---
poisoning:
  poison_rate: 0.0            # fraction of evidence passages replaced (overridable via CLI)
  strategy: "opposite_label"  # Strategy A: distractors from opposite-label claims

# --- Models ---
models:
  default: "Qwen/Qwen2.5-1.5B-Instruct"
  available:
    - "Qwen/Qwen2.5-1.5B-Instruct"
    - "google/gemma-2-2b-it"
    - "HuggingFaceTB/SmolLM2-1.7B-Instruct"
    - "microsoft/Phi-3.5-mini-instruct"
    - "meta-llama/Llama-3.2-3B-Instruct"
  temperature: 0.0            # 0.0 for deterministic; >0 required for self-consistency runs
  temperature_consistency: 0.7

# --- Prompts ---
prompts:
  default: "standard"         # FEVER prompts: standard, chain_of_thought, vigilant
  default_qa: "standard_qa"   # HotpotQA prompts: standard_qa, cot_qa, vigilant_qa

# --- Evaluation ---
evaluation:
  n_examples: 50              # claims evaluated in main experiment
  self_consistency_runs: 5    # inference repetitions for self-consistency metric
  self_consistency_subset: 30 # number of claims used for self-consistency experiment

# --- Caching ---
cache:
  dir: ".cache"
  embeddings_subdir: "embeddings"
  llm_subdir: "llm_responses"

# --- Inference ---
inference:
  note: "Using local HuggingFace models - no API cost. Inference time is the bottleneck. Re-runs are near-free due to caching."
